# Deploy Welcome Car Decor (static export). Manual trigger.
# Build produces out/; configure AWS credentials to upload to S3/CloudFront if needed.

name: Deploy – Web

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'AWS region (India)'
        required: true
        default: 'ap-south-1'
        type: choice
        options:
          - ap-south-1
          - ap-south-2
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload out artifact
        uses: actions/upload-artifact@v4
        with:
          name: out
          path: out/

